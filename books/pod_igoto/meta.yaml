    intro: |
      Пролетта на 1876 година. Бурната нощ продължава — Иван Краличът е избягал от обора на Бай Марко, прехвърлил се през зида, гонен от заптиета из тъмните улици на Бяла черкова. Пушки са гърмели подире му, но мракът го е спасил. Изтощен, кървящ, без горна дреха, той се е влачил из полето под бурята — гръмотевици, дъжд, виелица. Най-после е намерил подслон в една самотна воденица край реката. Вътре е тъмно и глухо. Бурята утихва, дъждът спира, месецът се показва между разкъсаните облаци. Тогава стъпки приближават отвън…
    first_message: "Виж, вятърът е отворил вратата."
    choices:
